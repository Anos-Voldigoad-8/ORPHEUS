<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORPHEUS — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/ui/landing.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
    <style>
        .modal { display: flex !important; background: transparent !important; }
        .login-container { border: 1px solid var(--cyan); box-shadow: 0 0 30px var(--cyan-glow); z-index: 100; }
        .hero, .navbar { display: none; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="overlay">
        <div id="modal-login" class="modal">
            <div class="login-container glassmorphism" style="max-width: 450px !important; position: relative; padding-bottom: 30px;">
                <a href="/" class="modal-close" style="text-decoration:none; position: absolute; right: 20px; top: 20px;">✕</a>
                
                <!-- LOGIN VIEW -->
                <div id="login-view">
                    <div class="login-header">
                        <h2>LOG IN</h2>
                        <p>EXISTING OPERATIVE</p>
                    </div>
                    <form id="login-form">
                        <div class="input-group">
                            <label>IDENTIFICATION (EMAIL)</label>
                            <input type="email" id="login-email" required placeholder="email@example.com">
                        </div>
                        <div class="input-group" style="margin-top: 15px;">
                            <label>SECURITY KEY (PASSWORD)</label>
                            <input type="password" id="login-password" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn-submit" id="login-submit-btn" style="margin-top: 25px;">
                            <span class="btn-text">ESTABLISH LINK 🚀</span>
                            <span class="loader" id="login-loader"></span>
                        </button>
                    </form>
                    
                    <div style="text-align: center; margin-top: 20px;">
                        <p style="color: var(--text-muted); font-size: 0.9rem;">
                            New here? <a href="#" id="toggle-to-signup" style="color: var(--cyan); text-decoration: none; font-weight: 600; text-shadow: 0 0 10px var(--cyan-glow);">Sign up</a>
                        </p>
                    </div>

                    <div class="divider" style="margin-top: 20px; margin-bottom: 20px;">
                        <span>OR</span>
                    </div>
                    <button class="btn-guest" id="guest-btn">GUEST ACCESS</button>
                </div>

                <!-- SIGNUP VIEW -->
                <div id="signup-view" style="display: none; animation: fadeIn 0.4s ease-out;">
                    <div class="login-header">
                        <h2 style="color: var(--purple); text-shadow: 0 0 15px var(--purple-glow);">SIGN UP</h2>
                        <p>NEW OPERATIVE</p>
                    </div>
                    <form id="signup-form">
                        <div class="input-group">
                            <label>IDENTIFICATION (EMAIL)</label>
                            <input type="email" id="signup-email" required placeholder="email@example.com">
                        </div>
                        <div class="input-group" style="margin-top: 15px;">
                            <label>SECURITY KEY (PASSWORD)</label>
                            <input type="password" id="signup-password" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn-submit" id="signup-submit-btn" style="margin-top: 25px; background: rgba(139, 92, 246, 0.2); border-color: var(--purple); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);">
                            <span class="btn-text">REQUEST CLEARANCE 📡</span>
                            <span class="loader" id="signup-loader"></span>
                        </button>
                    </form>
                    
                    <div style="text-align: center; margin-top: 20px;">
                        <p style="color: var(--text-muted); font-size: 0.9rem;">
                            Already an operative? <a href="#" id="toggle-to-login" style="color: var(--purple); text-decoration: none; font-weight: 600; text-shadow: 0 0 10px var(--purple-glow);">Log in</a>
                        </p>
                    </div>
                </div>

                <div id="error-message" class="error-message" style="text-align: center; margin-top: 10px;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/ui/landing.js"></script>
</body>
</html>
